<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Trương Hoàng Tĩn — Cho thuê TKQC Facebook</title>
<meta name="theme-color" content="#2563EB">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg1:#fff;--bg2:#f8fafc;--bg3:#f2f5fa;
  --tx1:#0f172a;--tx2:#475569;--tx3:#64748b;--tx-hint:#94a3b8;
  --bd1:rgba(15,23,42,.08);--bd2:rgba(15,23,42,.14);
  --green:#059669;--green-bg:#ecfdf5;--green-tx:#047857;
  --red:#dc2626;--red-bg:#fef2f2;--red-tx:#b91c1c;
  --amber:#d97706;--amber-bg:#fff7ed;--amber-tx:#b45309;
  --blue:#2563eb;--blue-bg:#eff6ff;--blue-tx:#1d4ed8;
  --purple:#5b4ce6;--purple-bg:#f3f0ff;--purple-tx:#4338ca;
  --coral:#ea580c;--coral-bg:#fff7ed;--coral-tx:#c2410c;
  --pink:#db2777;--pink-bg:#fdf2f8;--pink-tx:#be185d;
  --teal:#0f766e;--teal-bg:#ecfeff;--teal-tx:#0f766e;
  --gray:#64748b;--gray-bg:#f1f5f9;--gray-tx:#475569;
  --radius:12px;--radius-lg:18px;
  --shadow-sm:0 8px 24px rgba(15,23,42,.06);
  --shadow-md:0 16px 40px rgba(15,23,42,.08);
  --shadow-lg:0 14px 32px rgba(15,23,42,.12);
}
html[data-theme="dark"]{
  --bg1:#0f172a;--bg2:#1e293b;--bg3:#0b1220;
  --tx1:#f1f5f9;--tx2:#cbd5e1;--tx3:#94a3b8;
  --bd1:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --blue-bg:rgba(37,99,235,.18);--green-bg:rgba(5,150,105,.18);
  --red-bg:rgba(220,38,38,.18);--amber-bg:rgba(217,119,6,.18);
  --purple-bg:rgba(91,76,230,.18);--coral-bg:rgba(234,88,12,.18);
  --teal-bg:rgba(15,118,110,.18);--gray-bg:rgba(100,116,139,.18);
  --shadow-sm:0 8px 24px rgba(0,0,0,.35);
}
html[data-theme="dark"] body{background:linear-gradient(180deg,#0b1220 0,#0f172a 100%);}
html[data-theme="dark"] .sidebar,html[data-theme="dark"] .mobile-header{background:rgba(15,23,42,.88);}
html[data-theme="dark"] th{background:rgba(30,41,59,.96);color:var(--tx1);}
html[data-theme="dark"] tr:hover td{background:var(--bg3);}
html[data-theme="dark"] input,html[data-theme="dark"] select,html[data-theme="dark"] textarea{background:var(--bg2);color:var(--tx1);border-color:var(--bd2);}
html[data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.85);cursor:pointer;}

html{scroll-behavior:smooth;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(180deg,#f7f9fc 0,#f2f5fa 100%);color:var(--tx1);min-height:100vh;line-height:1.45;-webkit-font-smoothing:antialiased;}
.app{display:grid;grid-template-columns:200px 1fr;min-height:100vh;}
@media(max-width:768px){.app{grid-template-columns:1fr;}.sidebar{display:none;position:fixed;z-index:100;width:240px;}.sidebar.open{display:block;box-shadow:4px 0 20px rgba(0,0,0,.2);}}

.sidebar{background:rgba(255,255,255,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-right:1px solid rgba(15,23,42,.06);padding:14px 0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.logo{padding:10px 22px 16px;border-bottom:1px solid var(--bd1);margin-bottom:10px;}
.logo h1{font-size:18px;font-weight:600;letter-spacing:-.02em;}
.logo span{font-size:11px;color:var(--tx2);}
.logo .live{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:4px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.nav-item{display:flex;align-items:center;gap:10px;margin:2px 12px;padding:10px 14px;font-size:13px;color:var(--tx2);cursor:pointer;border-radius:10px;font-weight:500;transition:all .15s;}
.nav-item:hover{background:rgba(37,99,235,.06);color:var(--tx1);}
.nav-item.active{background:var(--blue-bg);color:var(--blue-tx);}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:9px;font-weight:600;display:none;}
.nav-badge.show{display:inline-block;}
.nav-sep{height:1px;background:var(--bd1);margin:8px 22px;}
.nav-label{padding:8px 22px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);font-weight:600;}

.mobile-header{display:none;padding:12px 16px;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd1);position:sticky;top:0;z-index:50;align-items:center;gap:12px;}
@media(max-width:768px){.mobile-header{display:flex;}}
.hamburger{width:28px;height:28px;display:flex;flex-direction:column;justify-content:center;gap:4px;cursor:pointer;background:none;border:none;padding:4px;}
.hamburger span{display:block;width:100%;height:2px;background:var(--tx1);border-radius:1px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99;}
.overlay.show{display:block;}

.main{padding:24px 28px;overflow-y:auto;}
@media(max-width:768px){.main{padding:16px;}}
.page-title{font-size:22px;font-weight:600;margin-bottom:4px;letter-spacing:-.02em;}
.page-sub{font-size:13px;color:var(--tx3);margin-bottom:18px;}

.kpi-grid{display:grid;gap:10px;margin-bottom:18px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
.kpi{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius);padding:14px 16px;}
.kpi-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;font-weight:600;}
.kpi-value{font-size:22px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;}
.kpi-note{font-size:11px;color:var(--tx3);margin-top:2px;}
.kpi-value.red{color:var(--red);}
.kpi-value.green{color:var(--green);}
.kpi-value.amber{color:var(--amber);}

.section-title{font-size:14px;font-weight:600;margin:20px 0 8px;display:flex;align-items:center;gap:8px;}
.section-title .count{font-size:11px;font-weight:500;color:var(--tx3);background:var(--bg3);padding:2px 8px;border-radius:8px;}

.card{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px;}
.card h3{font-size:14px;font-weight:600;margin-bottom:12px;}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;align-items:center;}
.toolbar input,.toolbar select{padding:8px 12px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg1);color:var(--tx1);font-size:13px;outline:none;font-family:inherit;}
.toolbar input:focus,.toolbar select:focus{border-color:var(--blue);}
.toolbar .grow{flex:1;min-width:200px;}

.table-wrap{background:var(--bg1);border:1px solid var(--bd1);border-radius:var(--radius-lg);overflow:hidden;}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;min-width:560px;}
th{text-align:left;padding:11px 14px;font-size:11px;font-weight:700;color:var(--tx2);background:var(--bg2);border-bottom:1px solid var(--bd1);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid var(--bd1);font-size:13px;color:var(--tx1);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.mono{font-variant-numeric:tabular-nums;letter-spacing:-.01em;}

.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;white-space:nowrap;}
.b-green{background:var(--green-bg);color:var(--green-tx);}
.b-red{background:var(--red-bg);color:var(--red-tx);}
.b-amber{background:var(--amber-bg);color:var(--amber-tx);}
.b-blue{background:var(--blue-bg);color:var(--blue-tx);}
.b-purple{background:var(--purple-bg);color:var(--purple-tx);}
.b-coral{background:var(--coral-bg);color:var(--coral-tx);}
.b-teal{background:var(--teal-bg);color:var(--teal-tx);}
.b-gray{background:var(--gray-bg);color:var(--gray-tx);}

.btn{padding:8px 14px;border:none;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn:active:not(:disabled){transform:scale(.97);}
.btn-primary{background:var(--blue);color:#fff;}
.btn-primary:hover:not(:disabled){background:#1d4ed8;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover:not(:disabled){background:#047857;}
.btn-red{background:var(--red);color:#fff;}
.btn-red:hover:not(:disabled){background:#b91c1c;}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd2);}
.btn-ghost:hover{background:var(--bg2);color:var(--tx1);}
.btn-sm{padding:5px 10px;font-size:12px;}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px;font-weight:600;}
.form-group input,.form-group select,.form-group textarea{padding:9px 11px;border:1px solid var(--bd2);border-radius:var(--radius);background:var(--bg1);color:var(--tx1);font-size:13px;outline:none;font-family:inherit;transition:border .15s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
.form-group textarea{resize:vertical;min-height:60px;}

.inline-input{padding:5px 8px;border:1px solid var(--bd2);border-radius:6px;background:var(--bg1);color:var(--tx1);font-size:12px;width:90px;font-family:inherit;font-variant-numeric:tabular-nums;outline:none;}
.inline-input:focus{border-color:var(--blue);}

.empty-state{text-align:center;padding:40px 20px;background:var(--bg2);border-radius:var(--radius-lg);color:var(--tx3);}
.empty-state-icon{font-size:36px;margin-bottom:10px;opacity:.6;}
.empty-state-title{font-size:14px;font-weight:500;color:var(--tx1);margin-bottom:6px;}
.empty-state-desc{font-size:12px;}

.loading{text-align:center;padding:40px;color:var(--tx3);font-size:14px;}
.loading::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid var(--bd2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--bg1);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-width:560px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--bd1);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:16px;font-weight:600;}
.modal-close{width:32px;height:32px;border:none;background:transparent;color:var(--tx3);font-size:20px;cursor:pointer;border-radius:8px;}
.modal-close:hover{background:var(--bg2);color:var(--tx1);}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-foot{padding:14px 20px;border-top:1px solid var(--bd1);display:flex;gap:8px;justify-content:flex-end;background:var(--bg2);}
html[data-theme="dark"] .modal{background:var(--bg2);}
html[data-theme="dark"] .modal-foot{background:var(--bg3);}

/* Toast */
#toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px;max-width:340px;}
.toast{background:var(--bg1);border:1px solid var(--bd1);border-left:4px solid var(--blue);border-radius:var(--radius);padding:12px 14px;font-size:13px;box-shadow:var(--shadow-md);animation:slideIn .25s ease;}
.toast.ok{border-left-color:var(--green);}
.toast.err{border-left-color:var(--red);}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* Sub-tabs */
.sub-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;}
.sub-tab{padding:7px 14px;font-size:13px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--bd2);background:var(--bg1);color:var(--tx2);font-family:inherit;}
.sub-tab:hover{background:var(--bg2);}
.sub-tab.active{background:var(--blue-bg);color:var(--blue-tx);border-color:var(--blue);font-weight:500;}

/* Theme toggle FAB */
.theme-fab{position:fixed;bottom:20px;right:20px;width:42px;height:42px;border-radius:50%;background:var(--bg1);border:1px solid var(--bd1);box-shadow:var(--shadow-md);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);z-index:90;}
.theme-fab:hover{color:var(--tx1);}
html[data-theme="dark"] .theme-icon-moon{display:none;}
html[data-theme="light"] .theme-icon-sun,html:not([data-theme="dark"]) .theme-icon-sun{display:none;}

/* Status badge map */
.s-active{background:var(--green-bg);color:var(--green-tx);}
.s-disabled,.s-closed{background:var(--red-bg);color:var(--red-tx);}
.s-paused,.s-pending{background:var(--amber-bg);color:var(--amber-tx);}
.s-grace,.s-unsettled{background:var(--coral-bg);color:var(--coral-tx);}

/* Responsive table → cards on mobile */
@media(max-width:600px){
  .hide-sm{display:none;}
}
</style>
</head>
<body>
<div class="mobile-header">
  <button class="hamburger" onclick="toggleSidebar()" aria-label="Menu"><span></span><span></span><span></span></button>
  <span style="font-weight:600;font-size:15px;">Trương Hoàng Tĩn</span>
</div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="logo">
      <h1>Trương Hoàng Tĩn <span class="live"></span></h1>
      <span>Cho thuê TKQC Facebook</span>
    </div>
    <div class="nav-item active" data-page="0" onclick="pg(0)"><div class="nav-dot" style="background:var(--purple)"></div>Tổng quan</div>
    <div class="nav-item" data-page="1" onclick="pg(1)"><div class="nav-dot" style="background:var(--teal)"></div>Tài khoản QC</div>
    <div class="nav-item" data-page="2" onclick="pg(2)"><div class="nav-dot" style="background:var(--blue)"></div>Đại lý</div>
    <div class="nav-item" data-page="3" onclick="pg(3)"><div class="nav-dot" style="background:var(--green)"></div>Chi tiêu</div>
    <div class="nav-item" data-page="4" onclick="pg(4)"><div class="nav-dot" style="background:var(--coral)"></div>Thanh toán</div>
    <div class="nav-item" data-page="5" onclick="pg(5)"><div class="nav-dot" style="background:var(--red)"></div>Cảnh báo<span class="nav-badge" id="nav-alert-count">0</span></div>
    <div class="nav-sep"></div>
    <div class="nav-label">Quản lý</div>
    <div class="nav-item" data-page="6" onclick="pg(6)"><div class="nav-dot" style="background:var(--amber)"></div>Admin</div>
  </aside>
  <main class="main" id="page"><div class="loading">Đang tải</div></main>
</div>

<button class="theme-fab" onclick="toggleTheme()" title="Đổi theme">
  <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke-linecap="round"/></svg>
</button>

<div id="toast-container"></div>

<!-- Modal generic -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="modal-head"><h3 id="modal-title">Modal</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// TRƯƠNG HOÀNG TĨN — Cho thuê TKQC Facebook
// ═══════════════════════════════════════════════════════════════
const SB_URL='https://pdysseecmxunxsyrohye.supabase.co';
const SB_KEY='sb_publishable_f8LkIfLg5CSTiyn2tnENTg_ckQWZMix';
const sb=supabase.createClient(SB_URL,SB_KEY);

// ─── State ───
let curPage=0;
let adAccounts=[],agencies=[],spendDaily=[],payments=[],policyAlerts=[],settings={};
let agencyDebt=[]; // computed from view v_agency_debt
let metaToken='',metaBusinessId='',codePattern='^([A-Z0-9]+)-';
let filterDateFrom='',filterDateTo='',filterAgencyId='',filterAccountId='';
let acFrom='2025-01-01',acTo='',acExpandedId=null;
let isLoading=false;

// ─── Helpers ───
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtVnd(n){n=Math.round(parseFloat(n)||0);return n.toLocaleString('en-US').replace(/,/g,'.');}
function fmtNum(n,d){d=d==null?2:d;return (parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtCur(n,cur){const v=fmtNum(n,cur==='VND'?0:2);return v+' '+(cur||'');}
function fmtDate(d){if(!d)return'';const dt=typeof d==='string'?new Date(d):d;return dt.toLocaleDateString('vi-VN');}
function todayStr(){return new Date().toISOString().slice(0,10);}
function monthAgo(){const d=new Date();d.setDate(d.getDate()-30);return d.toISOString().slice(0,10);}

function toast(msg,type){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast '+(type||'');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},3500);
}

function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme');
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('qt-theme',next);
}
(function initTheme(){
  const saved=localStorage.getItem('qt-theme');
  if(saved)document.documentElement.setAttribute('data-theme',saved);
})();

// ─── Modal ───
function openModal(title,bodyHtml,footHtml){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  document.getElementById('modal-foot').innerHTML=footHtml||'<button class="btn btn-ghost" onclick="closeModal()">Đóng</button>';
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('show');}

// ─── Status badge ───
function statusBadge(s){
  if(!s)return'<span class="badge b-gray">—</span>';
  const map={
    'ACTIVE':'b-green','PAUSED':'b-amber','DISABLED':'b-red','CLOSED':'b-red',
    'UNSETTLED':'b-coral','PENDING_RISK_REVIEW':'b-amber','PENDING_SETTLEMENT':'b-coral',
    'IN_GRACE_PERIOD':'b-amber','PENDING_CLOSURE':'b-red','ARCHIVED':'b-gray',
    'DISAPPROVED':'b-red','PENDING_REVIEW':'b-amber','REJECTED':'b-red'
  };
  const cls=map[s]||'b-gray';
  return'<span class="badge '+cls+'">'+esc(s)+'</span>';
}

// ─── Detect agency_code from campaign_name ───
function detectAgencyCode(name){
  if(!name)return null;
  try{
    const re=new RegExp(codePattern);
    const m=name.match(re);
    return m&&m[1]?m[1].toUpperCase():null;
  }catch(e){return null;}
}

// ═══════════════════════════════════════════════════════════════
// LOAD DATA
// ═══════════════════════════════════════════════════════════════
async function loadAll(){
  isLoading=true;
  try{
    const [r1,r2,r3,r4,r5,r6,r7]=await Promise.all([
      sb.from('ad_accounts').select('*').order('id'),
      sb.from('agencies').select('*').order('code'),
      sb.from('spend_daily').select('*').gte('date','2025-01-01').order('date',{ascending:false}).limit(20000),
      sb.from('payments').select('*').order('paid_at',{ascending:false}).limit(500),
      sb.from('policy_alerts').select('*').order('detected_at',{ascending:false}).limit(200),
      sb.from('app_settings').select('*'),
      sb.from('v_agency_debt').select('*')
    ]);
    if(r1.error)throw r1.error;
    if(r2.error)throw r2.error;
    if(r3.error)throw r3.error;
    if(r4.error)throw r4.error;
    if(r5.error)throw r5.error;
    if(r6.error)throw r6.error;
    if(r7.error)throw r7.error;
    adAccounts=r1.data||[];
    agencies=r2.data||[];
    spendDaily=r3.data||[];
    payments=r4.data||[];
    policyAlerts=r5.data||[];
    agencyDebt=r7.data||[];
    settings={};
    (r6.data||[]).forEach(s=>settings[s.key]=s.value);
    metaToken=settings.meta_access_token||'';
    metaBusinessId=settings.meta_business_id||'';
    codePattern=settings.agency_code_pattern||'^([A-Z0-9]+)-';
    updateAlertBadge();
  }catch(e){
    console.error(e);
    toast('Lỗi tải dữ liệu: '+(e.message||e),'err');
  }finally{
    isLoading=false;
  }
}

function updateAlertBadge(){
  const debtAlerts=agencyDebt.filter(a=>(a.unpaid_vnd||0)>=(a.debt_threshold_vnd||0)&&(a.unpaid_vnd||0)>0).length;
  const policyOpen=policyAlerts.filter(p=>!p.is_resolved).length;
  const orphans=spendDaily.filter(s=>s.is_orphan).length;
  const total=debtAlerts+policyOpen+(orphans>0?1:0);
  const el=document.getElementById('nav-alert-count');
  el.textContent=total;
  el.classList.toggle('show',total>0);
}

// PAGE ROUTER
// ═══════════════════════════════════════════════════════════════
async function pg(n){
  curPage=n;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.page==String(n));
  });
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('overlay').classList.remove('show');
  }
  document.getElementById('page').innerHTML='<div class="loading">Đang tải</div>';
  await loadAll();
  const renders=[renderOverview,renderAccounts,renderAgencies,renderSpend,renderPayments,renderAlerts,renderAdmin];
  renders[n]();
}

// PAGE 0: TỔNG QUAN
// ═══════════════════════════════════════════════════════════════
function renderOverview(){
  const today=todayStr();
  const todaySpend=spendDaily.filter(s=>s.date===today);
  const monthSpend=spendDaily;
  const sumByCur=(rows)=>{
    const m={USD:0,EUR:0,VND:0};
    rows.forEach(s=>{m[s.currency]=(m[s.currency]||0)+(parseFloat(s.spend_native)||0);});
    return m;
  };
  const todayCur=sumByCur(todaySpend);
  const monthCur=sumByCur(monthSpend);
  const todayVnd=todaySpend.reduce((a,s)=>a+(parseInt(s.amount_vnd)||0),0);
  const monthVnd=monthSpend.reduce((a,s)=>a+(parseInt(s.amount_vnd)||0),0);
  const totalDebt=agencyDebt.reduce((a,d)=>a+(parseInt(d.unpaid_vnd)||0),0);
  const activeAccounts=adAccounts.filter(a=>a.is_active).length;
  const activeAgencies=agencies.filter(a=>a.is_active).length;
  const debtOver=agencyDebt.filter(a=>(a.unpaid_vnd||0)>=(a.debt_threshold_vnd||0)&&(a.unpaid_vnd||0)>0).length;
  const policyOpen=policyAlerts.filter(p=>!p.is_resolved).length;
  const orphans=spendDaily.filter(s=>s.is_orphan).length;

  const fmtCurLine=(m)=>{
    const parts=[];
    if(m.USD)parts.push(fmtNum(m.USD,2)+' USD');
    if(m.EUR)parts.push(fmtNum(m.EUR,2)+' EUR');
    if(m.VND)parts.push(fmtVnd(m.VND)+' VND');
    return parts.join(' · ')||'—';
  };

  // Top 5 đại lý theo công nợ
  const topDebt=agencyDebt.slice().sort((a,b)=>(b.unpaid_vnd||0)-(a.unpaid_vnd||0)).slice(0,5);

  let html=`
    <h1 class="page-title">Tổng quan</h1>
    <p class="page-sub">Cập nhật: ${fmtDate(new Date())} · ${activeAccounts} TKQC active · ${activeAgencies} đại lý</p>

    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Chi tiêu hôm nay</div><div class="kpi-value">${fmtVnd(todayVnd)}<span style="font-size:13px;color:var(--tx3);"> VNĐ</span></div><div class="kpi-note">${fmtCurLine(todayCur)}</div></div>
      <div class="kpi"><div class="kpi-label">Chi tiêu 30 ngày</div><div class="kpi-value">${fmtVnd(monthVnd)}<span style="font-size:13px;color:var(--tx3);"> VNĐ</span></div><div class="kpi-note">${fmtCurLine(monthCur)}</div></div>
      <div class="kpi"><div class="kpi-label">Tổng công nợ</div><div class="kpi-value ${totalDebt>0?'red':''}">${fmtVnd(totalDebt)}<span style="font-size:13px;color:var(--tx3);"> VNĐ</span></div><div class="kpi-note">${agencyDebt.filter(d=>(d.unpaid_vnd||0)>0).length} đại lý đang nợ</div></div>
      <div class="kpi"><div class="kpi-label">Cảnh báo</div><div class="kpi-value ${(debtOver+policyOpen)>0?'red':''}">${debtOver+policyOpen+(orphans>0?1:0)}</div><div class="kpi-note">${debtOver} nợ vượt · ${policyOpen} vi phạm · ${orphans} sai mã</div></div>
    </div>

    <div class="section-title">Top đại lý theo công nợ <span class="count">${topDebt.length}</span></div>
    <div class="table-wrap"><div class="table-scroll"><table>
      <thead><tr><th>Mã</th><th>Tên</th><th class="hide-sm">% phí</th><th>Đã thanh toán</th><th>Công nợ</th><th>Ngưỡng</th><th></th></tr></thead>
      <tbody>`;
  if(!topDebt.length){
    html+=`<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">💼</div><div class="empty-state-title">Chưa có đại lý nào</div><div class="empty-state-desc">Vào tab Đại lý để thêm mới</div></div></td></tr>`;
  }else{
    topDebt.forEach(d=>{
      const over=(d.unpaid_vnd||0)>=(d.debt_threshold_vnd||0)&&(d.unpaid_vnd||0)>0;
      html+=`<tr>
        <td><span class="badge b-blue">${esc(d.agency_code)}</span></td>
        <td>${esc(d.agency_name)}</td>
        <td class="hide-sm mono">${fmtNum(d.fee_percent,2)}%</td>
        <td class="mono">${fmtVnd(d.total_paid_vnd)}</td>
        <td class="mono" style="font-weight:600;${over?'color:var(--red);':''}">${fmtVnd(d.unpaid_vnd)}</td>
        <td class="mono" style="color:var(--tx3);">${fmtVnd(d.debt_threshold_vnd)}</td>
        <td>${over?'<span class="badge b-red">Vượt ngưỡng</span>':''}</td>
      </tr>`;
    });
  }
  html+=`</tbody></table></div></div>

    <div class="section-title">Cảnh báo gần nhất <span class="count">${policyAlerts.filter(p=>!p.is_resolved).length}</span></div>
    <div class="table-wrap"><div class="table-scroll"><table>
      <thead><tr><th>Loại</th><th>Campaign</th><th>Đại lý</th><th>Phát hiện</th></tr></thead>
      <tbody>`;
  const recentAlerts=policyAlerts.filter(p=>!p.is_resolved).slice(0,8);
  if(!recentAlerts.length){
    html+=`<tr><td colspan="4"><div class="empty-state"><div class="empty-state-icon">✓</div><div class="empty-state-title">Không có cảnh báo</div><div class="empty-state-desc">Mọi campaign đang chạy bình thường</div></div></td></tr>`;
  }else{
    recentAlerts.forEach(a=>{
      html+=`<tr>
        <td>${statusBadge(a.issue_type)}</td>
        <td><div style="font-weight:500;">${esc(a.campaign_name||a.campaign_id)}</div><div style="font-size:11px;color:var(--tx3);">${esc(a.issue_detail||'')}</div></td>
        <td>${a.agency_code?'<span class="badge b-blue">'+esc(a.agency_code)+'</span>':'<span class="badge b-gray">—</span>'}</td>
        <td style="color:var(--tx3);font-size:12px;">${fmtDate(a.detected_at)}</td>
      </tr>`;
    });
  }
  html+=`</tbody></table></div></div>`;
  document.getElementById('page').innerHTML=html;
}

// PAGE 1: TÀI KHOẢN QUẢNG CÁO
// ═══════════════════════════════════════════════════════════════
function renderAccounts(){
  if(!acTo)acTo=todayStr();
  const usdRate=parseFloat(settings.usd_to_vnd_rate)||26800;
  // Aggregate spend per ad_account_id within [acFrom..acTo]
  const spendMap={};
  spendDaily.forEach(s=>{
    if(acFrom&&s.date<acFrom)return;
    if(acTo&&s.date>acTo)return;
    if(!spendMap[s.ad_account_id])spendMap[s.ad_account_id]={native:0,vnd:0,days:new Set()};
    spendMap[s.ad_account_id].native+=parseFloat(s.spend_native)||0;
    spendMap[s.ad_account_id].vnd+=parseInt(s.amount_vnd)||0;
    spendMap[s.ad_account_id].days.add(s.date);
  });

  let html=`
    <h1 class="page-title">Tài khoản quảng cáo</h1>
    <p class="page-sub">Quản lý ${adAccounts.length} TKQC · Chi tiêu từ ${fmtDate(acFrom)} → ${fmtDate(acTo)} · Tỉ giá USD: ${fmtVnd(usdRate)}đ</p>

    <div class="toolbar">
      <button class="btn btn-primary" onclick="openAccountForm()">+ Thêm TKQC</button>
      <button class="btn btn-green" onclick="syncMeta()" ${metaToken?'':'disabled title="Cấu hình Meta token ở tab Admin trước"'}>⟳ Sync Meta API</button>
      <span style="color:var(--tx3);font-size:12px;margin-left:8px;">Khoảng:</span>
      <input type="date" value="${acFrom}" onchange="acFrom=this.value;renderAccounts()" style="font-size:12px;" />
      <span style="color:var(--tx3);">→</span>
      <input type="date" value="${acTo}" onchange="acTo=this.value;renderAccounts()" style="font-size:12px;" />
    </div>

    <div class="table-wrap"><div class="table-scroll"><table>
      <thead><tr>
        <th>Tên</th><th>Trạng Thái</th><th>ID</th><th>Đại lý</th>
        <th>Chi tiêu</th><th>Chi tiêu (USD)</th><th>Tiền Tệ</th><th></th>
      </tr></thead>
      <tbody>`;
  if(!adAccounts.length){
    const canDiscover=metaToken&&metaBusinessId;
    html+=`<tr><td colspan="8"><div class="empty-state">
      <div class="empty-state-icon">💳</div>
      <div class="empty-state-title">Chưa có TKQC</div>
      <div class="empty-state-desc">${canDiscover?'Tải tự động từ Business Manager hoặc thêm tay':'Cấu hình Meta token ở tab Admin để tải tự động, hoặc thêm tay'}</div>
      <div style="margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
        ${canDiscover?'<button class="btn btn-primary" onclick="discoverAccounts(\'owned\')">📥 Tải tự động từ BM</button>':''}
        <button class="btn btn-ghost" onclick="openAccountForm()">+ Thêm tay</button>
        ${!canDiscover?'<button class="btn btn-ghost" onclick="pg(6)">⚙ Đi đến Admin</button>':''}
      </div>
    </div></td></tr>`;
  }else{
    adAccounts.forEach(a=>{
      const m=spendMap[a.id]||{native:0,vnd:0,days:new Set()};
      // Quy đổi USD chuẩn: spend native -> VND -> USD
      const spendVnd=m.vnd||(m.native*(parseFloat(a.exchange_rate)||0));
      const spendUsd=spendVnd>0?spendVnd/usdRate:0;
      // Đại lý hiển thị
      const aids=Array.isArray(a.agency_ids)?a.agency_ids:[];
      const agNames=aids.map(id=>{const ag=agencies.find(x=>x.id===id);return ag?ag.name:null;}).filter(Boolean);
      const agText=agNames.length?agNames.join(', '):'<span style="color:var(--tx3);">—</span>';
      const isOpen=acExpandedId===a.id;
      html+=`<tr>
        <td><div style="font-weight:500;">${esc(a.name)}</div></td>
        <td>${a.is_active?'<span class="badge b-green">Active</span>':'<span class="badge b-red">Inactive</span>'}</td>
        <td class="mono" style="font-size:12px;color:var(--tx3);">${esc(a.meta_account_id)}</td>
        <td style="font-size:12px;max-width:200px;">${agText}</td>
        <td class="mono">${m.native>0?fmtCur(m.native,a.currency):'<span style="color:var(--tx3);">—</span>'}</td>
        <td class="mono" style="font-weight:600;color:var(--green);">${spendUsd>0?'$'+fmtNum(spendUsd,2):'<span style="color:var(--tx3);font-weight:400;">—</span>'}</td>
        <td><span class="badge b-${a.currency==='USD'?'green':(a.currency==='EUR'?'amber':'blue')}">${esc(a.currency)}</span></td>
        <td style="white-space:nowrap;">
          <button class="btn btn-ghost btn-sm" onclick="toggleAccountDays(${a.id})" title="Xem chi tiêu từng ngày">${isOpen?'▾ Ẩn':'▸ Theo ngày'}</button>
          <button class="btn btn-ghost btn-sm" onclick="openAccountForm(${a.id})">Sửa</button>
        </td>
      </tr>`;
      if(isOpen){
        const byDate={};
        spendDaily.forEach(s=>{
          if(s.ad_account_id!==a.id)return;
          if(acFrom&&s.date<acFrom)return;
          if(acTo&&s.date>acTo)return;
          if(!byDate[s.date])byDate[s.date]={native:0,vnd:0,n:0};
          byDate[s.date].native+=parseFloat(s.spend_native)||0;
          byDate[s.date].vnd+=parseInt(s.amount_vnd)||0;
          byDate[s.date].n++;
        });
        const days=Object.keys(byDate).sort().reverse();
        html+=`<tr><td colspan="8" style="padding:0;background:var(--bg2);">
          <div style="padding:10px 16px;font-size:12px;color:var(--tx3);">Chi tiêu theo ngày của <b>${esc(a.name)}</b> · ${days.length} ngày</div>`;
        if(!days.length){
          html+=`<div style="padding:14px;text-align:center;color:var(--tx3);font-size:12px;">Không có chi tiêu trong khoảng đã chọn — thử bấm Sync Meta API</div>`;
        }else{
          html+=`<table style="margin:0;"><thead><tr><th style="font-size:11px;">Ngày</th><th style="font-size:11px;">Số campaign</th><th style="font-size:11px;">Spend</th><th style="font-size:11px;">Quy USD</th></tr></thead><tbody>`;
          days.forEach(d=>{
            const x=byDate[d];
            const xVnd=x.vnd||(x.native*(parseFloat(a.exchange_rate)||0));
            const xUsd=xVnd>0?xVnd/usdRate:0;
            html+=`<tr><td style="font-size:12px;">${fmtDate(d)}</td><td class="mono" style="font-size:12px;color:var(--tx3);">${x.n}</td><td class="mono" style="font-size:12px;">${fmtCur(x.native,a.currency)}</td><td class="mono" style="font-size:12px;font-weight:600;color:var(--green);">${xUsd>0?'$'+fmtNum(xUsd,2):'—'}</td></tr>`;
          });
          html+=`</tbody></table>`;
        }
        html+=`</td></tr>`;
      }
    });
  }
  html+=`</tbody></table></div></div>`;
  document.getElementById('page').innerHTML=html;
}

function toggleAccountDays(id){
  acExpandedId=acExpandedId===id?null:id;
  renderAccounts();
}

async function updateExchangeRate(id,val){
  const v=parseFloat(val)||0;
  if(v<0)return toast('Tỷ giá phải >= 0','err');
  try{
    const {error}=await sb.from('ad_accounts').update({exchange_rate:v}).eq('id',id);
    if(error)throw error;
    const a=adAccounts.find(x=>x.id===id);if(a)a.exchange_rate=v;
    toast('Đã lưu tỷ giá','ok');
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

function openAccountForm(id){
  const a=id?adAccounts.find(x=>x.id===id):{};
  const isEdit=!!id;
  const aids=Array.isArray(a.agency_ids)?a.agency_ids:[];
  const agencyChecks=agencies.length
    ? agencies.map(ag=>`<label style="display:flex;align-items:center;gap:6px;padding:4px 8px;border:1px solid var(--bd);border-radius:6px;font-size:12px;cursor:pointer;background:${aids.includes(ag.id)?'var(--bg2)':'transparent'};"><input type="checkbox" class="f-agency-chk" value="${ag.id}" ${aids.includes(ag.id)?'checked':''} /> ${esc(ag.name||ag.code||('#'+ag.id))}</label>`).join('')
    : '<span style="color:var(--tx3);font-size:12px;">Chưa có đại lý — tạo ở tab Đại lý trước</span>';
  const body=`
    <div class="form-grid">
      <div class="form-group"><label>Tên hiển thị *</label><input id="f-name" value="${esc(a.name||'')}" placeholder="VD: TKQC Main USD" /></div>
      <div class="form-group"><label>Meta Account ID *</label><input id="f-mid" value="${esc(a.meta_account_id||'')}" placeholder="act_xxxxxxx" ${isEdit?'readonly':''} /></div>
      <div class="form-group"><label>Tiền tệ *</label><select id="f-cur"><option ${a.currency==='USD'?'selected':''}>USD</option><option ${a.currency==='EUR'?'selected':''}>EUR</option><option ${a.currency==='VND'?'selected':''}>VND</option></select></div>
      <div class="form-group"><label>Tỷ giá → VNĐ</label><input id="f-rate" type="number" step="0.0001" value="${a.exchange_rate||''}" placeholder="VD: 26800" /></div>
      <div class="form-group"><label>Số dư (native)</label><input id="f-bal" type="number" step="0.01" value="${a.balance||''}" /></div>
      <div class="form-group"><label>Trạng thái Meta</label><input id="f-status" value="${esc(a.status||'ACTIVE')}" /></div>
      <div class="form-group"><label>Spend cap (native)</label><input id="f-cap" type="number" step="0.01" value="${a.spend_cap||''}" /></div>
      <div class="form-group"><label>Đã tiêu (native)</label><input id="f-spent" type="number" step="0.01" value="${a.amount_spent||''}" /></div>
      <div class="form-group"><label>Business ID</label><input id="f-biz" value="${esc(a.business_id||'')}" /></div>
      <div class="form-group"><label>Active</label><select id="f-active"><option value="true" ${a.is_active!==false?'selected':''}>Có</option><option value="false" ${a.is_active===false?'selected':''}>Không</option></select></div>
    </div>
    <div class="form-group"><label>Đại lý đang chạy trên TKQC này (chọn nhiều)</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;padding:6px;border:1px solid var(--bd);border-radius:6px;max-height:140px;overflow:auto;background:var(--bg);">${agencyChecks}</div>
    </div>
    <div class="form-group"><label>Ghi chú</label><textarea id="f-note">${esc(a.note||'')}</textarea></div>
  `;
  const foot=`
    ${isEdit?`<button class="btn btn-red" onclick="deleteAccount(${id})">Xoá</button>`:''}
    <div style="flex:1"></div>
    <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
    <button class="btn btn-primary" onclick="saveAccount(${id||'null'})">Lưu</button>
  `;
  openModal(isEdit?'Sửa TKQC':'Thêm TKQC',body,foot);
}

async function saveAccount(id){
  const agencyIds=Array.from(document.querySelectorAll('.f-agency-chk:checked')).map(c=>parseInt(c.value)).filter(Boolean);
  const data={
    name:document.getElementById('f-name').value.trim(),
    meta_account_id:document.getElementById('f-mid').value.trim(),
    currency:document.getElementById('f-cur').value,
    exchange_rate:parseFloat(document.getElementById('f-rate').value)||0,
    status:document.getElementById('f-status').value.trim()||null,
    spend_cap:parseFloat(document.getElementById('f-cap').value)||null,
    amount_spent:parseFloat(document.getElementById('f-spent').value)||0,
    balance:parseFloat(document.getElementById('f-bal').value)||null,
    business_id:document.getElementById('f-biz').value.trim()||null,
    is_active:document.getElementById('f-active').value==='true',
    note:document.getElementById('f-note').value.trim()||null,
    agency_ids:agencyIds
  };
  if(!data.name||!data.meta_account_id)return toast('Tên và Meta Account ID bắt buộc','err');
  try{
    if(id){
      const {error}=await sb.from('ad_accounts').update(data).eq('id',id);
      if(error)throw error;
      toast('Đã cập nhật','ok');
    }else{
      const {error}=await sb.from('ad_accounts').insert(data);
      if(error)throw error;
      toast('Đã thêm TKQC','ok');
    }
    closeModal();
    await loadAll();renderAccounts();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

async function deleteAccount(id){
  if(!confirm('Xoá TKQC này? Toàn bộ chi tiêu liên quan cũng bị xoá.'))return;
  try{
    const {error}=await sb.from('ad_accounts').delete().eq('id',id);
    if(error)throw error;
    toast('Đã xoá','ok');closeModal();await loadAll();renderAccounts();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

// ═══════════════════════════════════════════════════════════════
// PAGE 2: ĐẠI LÝ
// ═══════════════════════════════════════════════════════════════
let agSearch='',agFilter='all';
function renderAgencies(){
  const debtMap={};agencyDebt.forEach(d=>debtMap[d.agency_id]=d);
  let list=agencies.slice();
  if(agSearch){
    const q=agSearch.toLowerCase();
    list=list.filter(a=>(a.code||'').toLowerCase().includes(q)||(a.name||'').toLowerCase().includes(q)||(a.phone||'').includes(q));
  }
  if(agFilter==='active')list=list.filter(a=>a.is_active);
  else if(agFilter==='debt')list=list.filter(a=>{const d=debtMap[a.id];return d&&(d.unpaid_vnd||0)>0;});
  else if(agFilter==='over')list=list.filter(a=>{const d=debtMap[a.id];return d&&(d.unpaid_vnd||0)>=(d.debt_threshold_vnd||0)&&(d.unpaid_vnd||0)>0;});

  let html=`
    <h1 class="page-title">Đại lý</h1>
    <p class="page-sub">${agencies.length} đại lý · ${agencies.filter(a=>a.is_active).length} active</p>

    <div class="toolbar">
      <input class="grow" id="ag-search" placeholder="Tìm theo mã, tên, SĐT..." value="${esc(agSearch)}" oninput="agSearch=this.value;renderAgencies()" />
      <select onchange="agFilter=this.value;renderAgencies()">
        <option value="all" ${agFilter==='all'?'selected':''}>Tất cả</option>
        <option value="active" ${agFilter==='active'?'selected':''}>Đang active</option>
        <option value="debt" ${agFilter==='debt'?'selected':''}>Đang nợ</option>
        <option value="over" ${agFilter==='over'?'selected':''}>Nợ vượt ngưỡng</option>
      </select>
      <button class="btn btn-primary" onclick="openAgencyForm()">+ Thêm khách hàng</button>
    </div>

    <div class="table-wrap"><div class="table-scroll"><table>
      <thead><tr>
        <th style="width:40px;">STT</th>
        <th>Tên Khách Hàng</th>
        <th>Mã Camp</th>
        <th title="Lấy tự động từ Meta API" style="background:#fff8c4;color:#7a5d00;">ID TKQC 🔒</th>
        <th title="Tổng spend trong toàn kỳ — từ Meta API" style="background:#fff8c4;color:#7a5d00;">Tổng NS đã chạy 🔒</th>
        <th>Tỉ giá chốt</th>
        <th>Rate</th>
        <th>Chốt tiền VNĐ</th>
        <th>KH chuyển USDT</th>
        <th>Tỉ giá mua USDT</th>
        <th>Đã bank VNĐ</th>
        <th>KH nợ</th>
        <th></th>
      </tr></thead>
      <tbody>`;
  if(!list.length){
    html+=`<tr><td colspan="13"><div class="empty-state"><div class="empty-state-icon">👥</div><div class="empty-state-title">Chưa có khách hàng</div><div class="empty-state-desc">Bấm "+ Thêm khách hàng" để bắt đầu</div></div></td></tr>`;
  }else{
    // tổng spend per agency từ spend_daily (toàn kỳ)
    const spendSum={};
    spendDaily.forEach(s=>{
      if(!s.agency_id)return;
      if(!spendSum[s.agency_id])spendSum[s.agency_id]=0;
      spendSum[s.agency_id]+=parseFloat(s.spend_native)||0;
    });
    list.forEach((a,idx)=>{
      const acc=a.ad_account_id?adAccounts.find(x=>x.id===a.ad_account_id):null;
      const accCur=acc?acc.currency:'USD';
      const spend=spendSum[a.id]||0;
      const billRate=parseFloat(a.billing_rate_vnd)||0;
      const fee=parseFloat(a.fee_percent)||0;
      const chotVnd=Math.round(spend*billRate*(fee/100));
      const usdt=parseFloat(a.usdt_received)||0;
      const usdtRate=parseFloat(a.usdt_buy_rate)||0;
      const bankVnd=Math.round(usdt*usdtRate);
      const debt=bankVnd-chotVnd;  // âm = khách còn nợ
      html+=`<tr>
        <td class="mono" style="color:var(--tx3);">${idx+1}</td>
        <td><div style="font-weight:500;">${esc(a.name)}</div>${!a.is_active?'<span class="badge b-gray" style="font-size:10px;">Inactive</span>':''}</td>
        <td><span class="badge b-blue mono">${esc(a.code)}</span></td>
        <td class="mono" style="font-size:12px;background:#fffceb;">${acc?esc(acc.meta_account_id):'<span style="color:var(--tx3);">— chưa link TKQC</span>'}</td>
        <td class="mono" style="background:#fffceb;font-weight:600;">${spend>0?fmtNum(spend,2)+' '+accCur:'<span style="color:var(--tx3);font-weight:400;">—</span>'}</td>
        <td><input class="inline-input" type="number" step="100" min="0" value="${billRate||''}" placeholder="26800" onchange="updateAgencyField(${a.id},'billing_rate_vnd',this.value)" style="width:90px;" /></td>
        <td><input class="inline-input" type="number" step="0.01" min="0" max="1" value="${fee?(fee/100).toFixed(2):''}" placeholder="0.65" onchange="updateAgencyField(${a.id},'fee_percent',parseFloat(this.value)*100)" style="width:60px;" /></td>
        <td class="mono" style="font-weight:600;">${chotVnd?fmtVnd(chotVnd):'<span style="color:var(--tx3);font-weight:400;">—</span>'}</td>
        <td><input class="inline-input" type="number" step="1" min="0" value="${usdt||''}" placeholder="0" onchange="updateAgencyField(${a.id},'usdt_received',this.value)" style="width:80px;" /></td>
        <td><input class="inline-input" type="number" step="100" min="0" value="${usdtRate||''}" placeholder="26700" onchange="updateAgencyField(${a.id},'usdt_buy_rate',this.value)" style="width:90px;" /></td>
        <td class="mono">${bankVnd?fmtVnd(bankVnd):'<span style="color:var(--tx3);">—</span>'}</td>
        <td class="mono" style="font-weight:600;color:${debt<0?'var(--red)':'var(--green)'};">${debt!==0?fmtVnd(debt):'<span style="color:var(--tx3);font-weight:400;">—</span>'}</td>
        <td>
          <button class="btn btn-ghost btn-sm" onclick="openAgencyForm(${a.id})">Sửa</button>
        </td>
      </tr>`;
    });
  }
  html+=`</tbody></table></div></div>`;
  document.getElementById('page').innerHTML=html;
}

async function updateAgencyField(id,field,val){
  const v=val===''||val==null?null:parseFloat(val);
  if(v!=null&&isNaN(v))return toast('Giá trị không hợp lệ','err');
  try{
    const {error}=await sb.from('agencies').update({[field]:v}).eq('id',id);
    if(error)throw error;
    const a=agencies.find(x=>x.id===id);if(a)a[field]=v;
    toast('Đã lưu','ok');
    renderAgencies();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

async function updateAgencyFee(id,val){
  const v=parseFloat(val);
  if(isNaN(v)||v<0||v>100)return toast('% phí phải 0-100','err');
  try{
    const {error}=await sb.from('agencies').update({fee_percent:v}).eq('id',id);
    if(error)throw error;
    toast('Đã lưu (lịch sử % được ghi nhận)','ok');
    await loadAll();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

      <div class="form-group"><label>TKQC liên kết</label><select id="f-account"><option value="">— Chưa link —</option>${adAccounts.map(x=>`<option value="${x.id}" ${a.ad_account_id===x.id?'selected':''}>${esc(x.name)} (${esc(x.meta_account_id)}) · ${x.currency}</option>`).join('')}</select></div>

      <div class="form-group"><label>Rate / % phí (vd 0.65 = 65%)</label><input id="f-fee" type="number" step="0.01" min="0" max="100" value="${a.fee_percent||settings.default_fee_percent||65}" /></div>

      <div class="form-group"><label>Tỉ giá mua USDT (→ VNĐ)</label><input id="f-usdtrate" type="number" step="100" min="0" value="${a.usdt_buy_rate||''}" placeholder="VD: 26700" /></div>

      <div class="form-group"><label>Active</label><select id="f-active"><option value="true" ${a.is_active!==false?'selected':''}>Có</option><option value="false" ${a.is_active===false?'selected':''}>Không</option></select></div>
    </div>
    <div class="form-group"><label>Ghi chú</label><textarea id="f-note">${esc(a.note||'')}</textarea></div>
  `;
  const foot=`
    ${isEdit?`<button class="btn btn-red" onclick="deleteAgency(${id})">Xoá</button>`:''}
    <div style="flex:1"></div>
    <button class="btn btn-ghost" onclick="closeModal()">Huỷ</button>
    <button class="btn btn-primary" onclick="saveAgency(${id||'null'})">Lưu</button>
  `;
  openModal(isEdit?'Sửa đại lý':'Thêm đại lý',body,foot);

async function saveAgency(id){
  const accVal=document.getElementById('f-account').value;
  const data={
    code:document.getElementById('f-code').value.trim().toUpperCase(),
    name:document.getElementById('f-name').value.trim(),
    phone:document.getElementById('f-phone').value.trim()||null,
    zalo:document.getElementById('f-zalo').value.trim()||null,
    fee_percent:parseFloat(document.getElementById('f-fee').value)||65,
    ad_account_id:accVal?parseInt(accVal):null,
    billing_rate_vnd:parseFloat(document.getElementById('f-billrate').value)||null,
    usdt_received:parseFloat(document.getElementById('f-usdt').value)||0,
    usdt_buy_rate:parseFloat(document.getElementById('f-usdtrate').value)||null,
    debt_threshold_vnd:parseInt(document.getElementById('f-thresh').value)||0,
    payment_type:document.getElementById('f-pay').value,
    is_active:document.getElementById('f-active').value==='true',
    note:document.getElementById('f-note').value.trim()||null
  };
  if(!data.code||!data.name)return toast('Mã và tên bắt buộc','err');
  try{
    if(id){
      const {error}=await sb.from('agencies').update(data).eq('id',id);
      if(error)throw error;
      toast('Đã cập nhật','ok');
    }else{
      const {error}=await sb.from('agencies').insert(data);
      if(error)throw error;
      toast('Đã thêm đại lý','ok');
    }
    closeModal();await loadAll();renderAgencies();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

async function deleteAgency(id){
  if(!confirm('Xoá đại lý này? Spend & payments liên quan vẫn còn nhưng mất link.'))return;
  try{
    const {error}=await sb.from('agencies').delete().eq('id',id);
    if(error)throw error;
    toast('Đã xoá','ok');closeModal();await loadAll();renderAgencies();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

let spendGroupBy='agency'; // agency | account | date
function renderSpend(){
  let list=spendDaily.slice();
  if(filterDateFrom)list=list.filter(s=>s.date>=filterDateFrom);
  if(filterDateTo)list=list.filter(s=>s.date<=filterDateTo);
  if(filterAgencyId)list=list.filter(s=>String(s.agency_id)===String(filterAgencyId));
  if(filterAccountId)list=list.filter(s=>String(s.ad_account_id)===String(filterAccountId));

  let html=`
    <h1 class="page-title">Chi tiêu</h1>
    <p class="page-sub">${list.length} dòng · ${filterDateFrom||'30 ngày'} → ${filterDateTo||'hôm nay'}</p>

    <div class="toolbar">
      <input type="date" value="${filterDateFrom}" onchange="filterDateFrom=this.value;renderSpend()" />
      <span style="color:var(--tx3);">→</span>
      <input type="date" value="${filterDateTo}" onchange="filterDateTo=this.value;renderSpend()" />
      <select onchange="filterAgencyId=this.value;renderSpend()">
        <option value="">Tất cả đại lý</option>
        ${agencies.map(a=>`<option value="${a.id}" ${String(filterAgencyId)===String(a.id)?'selected':''}>${esc(a.code)} — ${esc(a.name)}</option>`).join('')}
      </select>
      <select onchange="filterAccountId=this.value;renderSpend()">
        <option value="">Tất cả TKQC</option>
        ${adAccounts.map(a=>`<option value="${a.id}" ${String(filterAccountId)===String(a.id)?'selected':''}>${esc(a.name)}</option>`).join('')}
      </select>
      <button class="btn btn-ghost btn-sm" onclick="filterDateFrom='';filterDateTo='';filterAgencyId='';filterAccountId='';renderSpend()">Reset</button>
    </div>

    <div class="sub-tabs">
      <button class="sub-tab ${spendGroupBy==='agency'?'active':''}" onclick="spendGroupBy='agency';renderSpend()">Theo đại lý</button>
      <button class="sub-tab ${spendGroupBy==='account'?'active':''}" onclick="spendGroupBy='account';renderSpend()">Theo TKQC</button>
      <button class="sub-tab ${spendGroupBy==='date'?'active':''}" onclick="spendGroupBy='date';renderSpend()">Theo ngày</button>
      <button class="sub-tab ${spendGroupBy==='detail'?'active':''}" onclick="spendGroupBy='detail';renderSpend()">Chi tiết campaign</button>
    </div>
  `;

  if(spendGroupBy==='detail'){
    html+=`<div class="table-wrap"><div class="table-scroll"><table>
      <thead><tr><th>Ngày</th><th>TKQC</th><th>Campaign</th><th>Đại lý</th><th>Spend</th><th>VNĐ</th><th>Trạng thái</th></tr></thead>
      <tbody>`;
    if(!list.length){
      html+=`<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-title">Chưa có dữ liệu</div><div class="empty-state-desc">Sync Meta API hoặc kiểm tra filter</div></div></td></tr>`;
    }else{
      list.slice(0,300).forEach(s=>{
        const acc=adAccounts.find(a=>a.id===s.ad_account_id);
        const ag=agencies.find(a=>a.id===s.agency_id);
        html+=`<tr>
          <td style="font-size:12px;">${fmtDate(s.date)}</td>
          <td style="font-size:12px;">${esc(acc?acc.name:'—')}</td>
          <td style="font-size:12px;">${esc(s.campaign_name||s.campaign_id)}</td>
          <td>${ag?'<span class="badge b-blue">'+esc(ag.code)+'</span>':s.is_orphan?'<span class="badge b-red">SAI MÃ</span>':'<span class="badge b-gray">—</span>'}</td>
          <td class="mono">${fmtCur(s.spend_native,s.currency)}</td>
          <td class="mono">${fmtVnd(s.amount_vnd)}</td>
          <td>${statusBadge(s.campaign_status)}</td>
        </tr>`;
      });
      if(list.length>300)html+=`<tr><td colspan="7" style="text-align:center;color:var(--tx3);font-size:12px;">Hiển thị 300/${list.length} dòng — lọc thêm để xem chi tiết</td></tr>`;
    }
    html+=`</tbody></table></div></div>`;
  }else{
    const groupKey=spendGroupBy==='agency'?'agency_id':spendGroupBy==='account'?'ad_account_id':'date';
    const groups={};
    list.forEach(s=>{
      const k=s[groupKey]||'__null__';
      if(!groups[k])groups[k]={key:k,spend:{USD:0,EUR:0,VND:0},vnd:0,count:0};
      groups[k].spend[s.currency]=(groups[k].spend[s.currency]||0)+(parseFloat(s.spend_native)||0);
      groups[k].vnd+=(parseInt(s.amount_vnd)||0);
      groups[k].count++;
    });
    const arr=Object.values(groups).sort((a,b)=>b.vnd-a.vnd);
    const labelFn=(k)=>{
      if(spendGroupBy==='agency'){if(k==='__null__')return'<span class="badge b-red">SAI MÃ / KHÔNG MATCH</span>';const a=agencies.find(x=>x.id==k);return a?'<span class="badge b-blue">'+esc(a.code)+'</span> '+esc(a.name):'#'+k;}
      if(spendGroupBy==='account'){const a=adAccounts.find(x=>x.id==k);return a?esc(a.name)+' <span class="badge b-gray">'+a.currency+'</span>':'#'+k;}
      return fmtDate(k);
    };
    html+=`<div class="table-wrap"><div class="table-scroll"><table>
      <thead><tr><th>${spendGroupBy==='agency'?'Đại lý':spendGroupBy==='account'?'TKQC':'Ngày'}</th><th>Số dòng</th><th>Spend</th><th>VNĐ thu khách</th></tr></thead>
      <tbody>`;
    if(!arr.length){
      html+=`<tr><td colspan="4"><div class="empty-state"><div class="empty-state-icon">📊</div><div class="empty-state-title">Chưa có dữ liệu</div></div></td></tr>`;
    }else{
      arr.forEach(g=>{
        const sp=[];
        if(g.spend.USD)sp.push(fmtNum(g.spend.USD,2)+' USD');
        if(g.spend.EUR)sp.push(fmtNum(g.spend.EUR,2)+' EUR');
        if(g.spend.VND)sp.push(fmtVnd(g.spend.VND)+' VND');
        html+=`<tr><td>${labelFn(g.key)}</td><td class="mono" style="color:var(--tx3);">${g.count}</td><td class="mono" style="font-size:12px;">${sp.join(' · ')||'—'}</td><td class="mono" style="font-weight:600;">${fmtVnd(g.vnd)}</td></tr>`;
      });
      const totVnd=arr.reduce((a,g)=>a+g.vnd,0);
      html+=`<tr style="background:var(--bg2);font-weight:600;"><td>Tổng</td><td class="mono">${list.length}</td><td></td><td class="mono">${fmtVnd(totVnd)}</td></tr>`;
    }
    html+=`</tbody></table></div></div>`;
  }
  document.getElementById('page').innerHTML=html;
}

let payFilterAgency='';
function renderPayments(){
  let list=payments.slice();
  if(payFilterAgency)list=list.filter(p=>String(p.agency_id)===String(payFilterAgency));

async function savePayment(){
  const data={
    agency_id:parseInt(document.getElementById('f-agency').value)||null,
    amount_vnd:parseInt(document.getElementById('f-amount').value)||0,
    paid_at:document.getElementById('f-date').value,
    payment_method:document.getElementById('f-method').value,
    reference_text:document.getElementById('f-ref').value.trim()||null,
    exchange_rate_snapshot:parseFloat(document.getElementById('f-rate').value)||null,
    note:document.getElementById('f-note').value.trim()||null
  };
  if(!data.agency_id||!data.amount_vnd||!data.paid_at)return toast('Đại lý, số tiền và ngày bắt buộc','err');
  try{
    const {error}=await sb.from('payments').insert(data);
    if(error)throw error;
    toast('Đã ghi nhận thanh toán','ok');
    closeModal();await loadAll();renderPayments();
  }catch(e){toast('Lỗi: '+e.message,'err');}

async function deletePayment(id){
  if(!confirm('Xoá giao dịch thanh toán này?'))return;
  try{
    const {error}=await sb.from('payments').delete().eq('id',id);
    if(error)throw error;
    toast('Đã xoá','ok');await loadAll();renderPayments();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

// ─── Auto Discover TKQC từ Business Manager ───
async function discoverAccounts(mode){
  if(!metaToken)return toast('Cấu hình Meta token trước','err');
  if((mode==='owned'||mode==='client')&&!metaBusinessId)return toast('Cần Business ID cho mode này','err');

  const fields='id,name,account_id,currency,account_status,balance,amount_spent,spend_cap,timezone_name,business';
  let endpoint;
  if(mode==='owned')endpoint=`${metaBusinessId}/owned_ad_accounts`;
  else if(mode==='client')endpoint=`${metaBusinessId}/client_ad_accounts`;
  else endpoint='me/adaccounts';

  toast('Đang tải danh sách TKQC...','');
  try{
    const statusMap={1:'ACTIVE',2:'DISABLED',3:'UNSETTLED',7:'PENDING_RISK_REVIEW',8:'PENDING_SETTLEMENT',9:'IN_GRACE_PERIOD',100:'PENDING_CLOSURE',101:'CLOSED'};
    let url=`https://graph.facebook.com/v19.0/${endpoint}?fields=${encodeURIComponent(fields)}&limit=200&access_token=${encodeURIComponent(metaToken)}`;
    let inserted=0,updated=0,skipped=0;
    while(url){
      const r=await fetch(url);
      const d=await r.json();
      if(d.error)throw new Error(d.error.message);
      const accounts=d.data||[];
      for(const a of accounts){
        // Skip nếu currency không thuộc USD/EUR/VND (constraint của bảng)
        const cur=(a.currency||'').toUpperCase();
        if(!['USD','EUR','VND'].includes(cur)){skipped++;continue;}
        // Meta trả "id" có dạng "act_xxx" rồi
        const metaAccountId=a.id||('act_'+a.account_id);
        const existing=adAccounts.find(x=>x.meta_account_id===metaAccountId);
        const payload={
          meta_account_id:metaAccountId,
          name:a.name||metaAccountId,
          currency:cur,
          status:statusMap[a.account_status]||String(a.account_status||''),
          balance:a.balance!=null?parseFloat(a.balance)/100:null,
          amount_spent:a.amount_spent!=null?parseFloat(a.amount_spent)/100:0,
          spend_cap:a.spend_cap!=null?parseFloat(a.spend_cap)/100:null,
          business_id:(a.business&&a.business.id)||metaBusinessId||null
        };
        if(existing){
          // Giữ lại exchange_rate đã nhập tay
          await sb.from('ad_accounts').update(payload).eq('id',existing.id);
          updated++;
        }else{
          payload.exchange_rate=cur==='VND'?1:0;
          payload.is_active=true;
          await sb.from('ad_accounts').insert(payload);
          inserted++;
        }
      }
      url=d.paging&&d.paging.next?d.paging.next:null;
    }
    const msg=`Đã import: ${inserted} mới · ${updated} cập nhật${skipped?' · '+skipped+' bỏ qua (currency lạ)':''}`;
    toast(msg,'ok');
    await loadAll();
    if(curPage===1)renderAccounts();
    else if(curPage===6)renderAdmin();
  }catch(e){
    console.error(e);
    toast('Lỗi: '+e.message,'err');
  }
}

async function recomputeAmounts(){
  if(!confirm('Tính lại amount_vnd cho toàn bộ spend chưa thanh toán theo tỷ giá hiện hành & % hiện hành?'))return;
  try{
    const accMap={};adAccounts.forEach(a=>accMap[a.id]=a);
    const agMap={};agencies.forEach(a=>agMap[a.id]=a);
    const unpaid=spendDaily.filter(s=>!s.is_paid&&s.agency_id);
    let n=0;
    for(const s of unpaid){
      const acc=accMap[s.ad_account_id];const ag=agMap[s.agency_id];
      if(!acc||!ag)continue;
      const rate=parseFloat(acc.exchange_rate)||0;
      const fee=parseFloat(ag.fee_percent)||0;
      const vnd=Math.round((parseFloat(s.spend_native)||0)*(fee/100)*rate);
      await sb.from('spend_daily').update({amount_vnd:vnd,exchange_rate_snapshot:rate,fee_percent_snapshot:fee}).eq('id',s.id);
      n++;
    }
    toast('Đã tính lại '+n+' dòng','ok');
    await loadAll();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

async function purgeSpend(){
  if(!confirm('XOÁ TOÀN BỘ spend_daily? Hành động này không thể hoàn tác.'))return;
  if(!confirm('Bạn chắc chắn?'))return;
  try{
    const {error}=await sb.from('spend_daily').delete().neq('id',0);
    if(error)throw error;
    toast('Đã xoá toàn bộ spend','ok');await loadAll();renderAdmin();
  }catch(e){toast('Lỗi: '+e.message,'err');}
}

// ═══════════════════════════════════════════════════════════════
// META API SYNC
// ═══════════════════════════════════════════════════════════════
async function syncMeta(){
  if(!metaToken)return toast('Cấu hình Meta token ở tab Admin trước','err');
  if(!adAccounts.length)return toast('Chưa có TKQC để sync','err');
  toast('Đang sync...','');
  let totalCampaigns=0,totalRows=0,errors=0;
  const errMsgs=[];
  try{
    const today=todayStr();
    const since=(typeof syncSinceOverride!=='undefined'&&syncSinceOverride)||'2025-01-01';
    for(const acc of adAccounts){
      if(!acc.is_active)continue;
      // Đảm bảo có prefix "act_" — Meta API yêu cầu
      const aid=String(acc.meta_account_id||'').startsWith('act_')?acc.meta_account_id:'act_'+acc.meta_account_id;
      // 1. Pull account info (status, balance, amount_spent)
      try{
        const url1=`https://graph.facebook.com/v19.0/${encodeURIComponent(aid)}?fields=account_status,balance,amount_spent,spend_cap,currency&access_token=${encodeURIComponent(metaToken)}`;
        const r=await fetch(url1);const d=await r.json();
        if(d.error)throw new Error(d.error.message);
        const statusMap={1:'ACTIVE',2:'DISABLED',3:'UNSETTLED',7:'PENDING_RISK_REVIEW',8:'PENDING_SETTLEMENT',9:'IN_GRACE_PERIOD',100:'PENDING_CLOSURE',101:'CLOSED',102:'ANY_ACTIVE',201:'ANY_CLOSED'};
        await sb.from('ad_accounts').update({
          status:statusMap[d.account_status]||String(d.account_status||''),
          balance:parseFloat(d.balance)/100||null,
          amount_spent:parseFloat(d.amount_spent)/100||0,
          spend_cap:d.spend_cap?parseFloat(d.spend_cap)/100:null
        }).eq('id',acc.id);
      }catch(e){console.warn('account info '+aid+': '+e.message);errMsgs.push('TK '+aid+' info: '+e.message);errors++;}

      // 2. Pull campaign insights (spend per campaign per day)
      try{
        const url2=`https://graph.facebook.com/v19.0/${encodeURIComponent(aid)}/insights?fields=campaign_id,campaign_name,spend,date_start&level=campaign&time_increment=1&time_range={"since":"${since}","until":"${today}"}&limit=500&access_token=${encodeURIComponent(metaToken)}`;
        let next=url2;
        while(next){
          const r=await fetch(next);const d=await r.json();
          if(d.error)throw new Error(d.error.message);
          for(const row of (d.data||[])){
            const code=detectAgencyCode(row.campaign_name);
            const ag=code?agencies.find(a=>a.code===code):null;
            const rate=parseFloat(acc.exchange_rate)||0;
            const fee=ag?parseFloat(ag.fee_percent)||0:0;
            const spend=parseFloat(row.spend)||0;
            const vnd=ag?Math.round(spend*(fee/100)*rate):null;
            await sb.from('spend_daily').upsert({
              date:row.date_start,
              ad_account_id:acc.id,
              campaign_id:row.campaign_id,
              campaign_name:row.campaign_name,
              agency_code:code,
              agency_id:ag?ag.id:null,
              spend_native:spend,
              currency:acc.currency,
              exchange_rate_snapshot:rate,
              fee_percent_snapshot:fee,
              amount_vnd:vnd,
              is_orphan:!ag
            },{onConflict:'date,ad_account_id,campaign_id'});
            totalRows++;
          }
          next=d.paging&&d.paging.next?d.paging.next:null;
        }
      }catch(e){console.warn('insights '+aid+': '+e.message);errMsgs.push('TK '+aid+' insights: '+e.message);errors++;}

      // 3. Pull campaign status + effective_status (cho policy alerts)
      try{
        const url3=`https://graph.facebook.com/v19.0/${encodeURIComponent(aid)}/campaigns?fields=id,name,status,effective_status&limit=300&access_token=${encodeURIComponent(metaToken)}`;
        let next=url3;
        while(next){
          const r=await fetch(next);const d=await r.json();
          if(d.error)throw new Error(d.error.message);
          for(const c of (d.data||[])){
            totalCampaigns++;
            // Update spend_daily.campaign_status
            await sb.from('spend_daily').update({campaign_status:c.status}).eq('ad_account_id',acc.id).eq('campaign_id',c.id);
            // Check effective_status cho policy violation
            const violations=['DISAPPROVED','CAMPAIGN_PAUSED','PENDING_REVIEW','REJECTED','PENDING_BILLING_INFO','POLICY_VIOLATION'];
            if(violations.includes(c.effective_status)){
              const code=detectAgencyCode(c.name);
              const ag=code?agencies.find(a=>a.code===code):null;
              await sb.from('policy_alerts').upsert({
                ad_account_id:acc.id,
                campaign_id:c.id,
                campaign_name:c.name,
                agency_id:ag?ag.id:null,
                agency_code:code,
                issue_type:c.effective_status,
                issue_detail:'Detected từ effective_status'
              },{onConflict:'ad_account_id,campaign_id,issue_type'});
            }
          }
          next=d.paging&&d.paging.next?d.paging.next:null;
        }
      }catch(e){console.warn('campaigns '+aid+': '+e.message);errMsgs.push('TK '+aid+' campaigns: '+e.message);errors++;}
    }
    if(errors&&errMsgs.length){alert('Lỗi sync chi tiết:\n\n'+errMsgs.slice(0,5).join('\n\n'));}
    toast(`Sync xong: ${totalRows} dòng spend, ${totalCampaigns} campaigns${errors?', '+errors+' lỗi':''}`,errors?'err':'ok');
    await loadAll();
    const renders=[renderOverview,renderAccounts,renderAgencies,renderSpend,renderPayments,renderAlerts,renderAdmin];
    renders[curPage]();
  }catch(e){
    toast('Sync lỗi: '+e.message,'err');
  }
}
